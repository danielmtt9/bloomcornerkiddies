<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Bloom Corner Kiddies | Kids Clothes Storefront</title>
  <meta name="description" content="Browse Bloom Corner Kiddies for beautiful kids clothes, trust-first shopping, and direct WhatsApp or Telegram handoff.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #FAFAF9;
      --surface: #FFFFFF;
      --surface-alt: #F3F4F6;
      --text: #1F2937;
      --muted: #9CA3AF;
      --accent: #E07A5F;
      --accent-soft: #FDE8E1;
      --border: #E5E7EB;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.03);
      --shadow-md: 0 12px 28px rgba(0,0,0,0.05);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 16px;
      --bottom-nav-height: 70px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: "Outfit", sans-serif;
      padding-bottom: calc(var(--bottom-nav-height) + 20px);
    }
    button { font: inherit; cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    
    .app-container {
      width: min(100%, 600px);
      margin: 0 auto;
      background: var(--bg);
      min-height: 100vh;
      position: relative;
    }

    /* HEADER */
    .header {
      padding: 20px 20px 10px;
      position: sticky;
      top: 0;
      background: rgba(250, 250, 249, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .brand-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin: 2px 0 0;
    }

    /* GREETING HERO */
    .hero {
      padding: 10px 20px 20px;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin: 0 0 8px;
      line-height: 1.1;
    }
    .hero p {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0;
      line-height: 1.4;
    }

    /* QUICK FILTERS */
    .quick-filters {
      padding: 0 20px 20px;
    }
    .filter-section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .scroll-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-width: none;
      margin-left: -20px;
      padding-left: 20px;
      margin-right: -20px;
      padding-right: 20px;
    }
    .scroll-row::-webkit-scrollbar { display: none; }
    .pill-btn {
      flex: 0 0 auto;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .pill-btn.is-active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: scale(1.02);
    }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 0 20px;
    }
    .product-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      position: relative;
      transition: transform 0.2s ease;
    }
    .product-card:active {
      transform: scale(0.98);
    }
    .card-img-wrap {
      aspect-ratio: 4/5;
      background: var(--surface-alt);
      position: relative;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
    }
    .badge-soldout { background: var(--text); color: #fff; }
    .card-info {
      padding: 12px;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-price {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--accent);
      margin: 0;
    }
    .card-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      display: flex;
      gap: 6px;
    }

    /* BOTTOM NAVIGATION */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--bottom-nav-height);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
    }
    .nav-item.is-active {
      color: var(--accent);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* DETAIL MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.is-open {
      opacity: 1;
      visibility: visible;
    }
    .modal-sheet {
      background: var(--surface);
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      max-height: 90vh;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .modal-overlay.is-open .modal-sheet {
      transform: translateY(0);
    }
    .modal-drag-handle {
      width: 40px;
      height: 4px;
      background: #D1D5DB;
      border-radius: 4px;
      margin: 12px auto;
    }
    .modal-img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      background: var(--surface-alt);
    }
    .modal-content {
      padding: 24px 20px;
    }
    .modal-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 0 8px;
      line-height: 1.1;
    }
    .modal-price {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      margin: 0 0 16px;
    }
    .modal-desc {
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 24px;
      font-size: 1rem;
    }
    
    .trust-badges {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: var(--bg);
      padding: 16px;
      border-radius: var(--radius-md);
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }
    .trust-item svg {
      width: 20px;
      height: 20px;
      stroke: var(--accent);
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 1.1rem;
      background: var(--accent);
      color: #fff;
      margin-bottom: 12px;
    }
    .action-btn.secondary {
      background: var(--surface-alt);
      color: var(--text);
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 1.1rem;
    }

  </style>
</head>
<body>
  <main class="app-container" x-data="storefrontApp()" x-init="init()">
    
    <header class="header">
      <div>
        <h1 class="brand-title" x-text="status.store_name || 'Bloom Corner'"></h1>
        <p class="brand-subtitle">Kids Fashion Boutique</p>
      </div>
      <div style="display:flex; align-items:center; gap:6px; font-size:0.8rem; font-weight:700; background:var(--surface-alt); padding:6px 12px; border-radius:999px;">
        <span style="width:8px; height:8px; background:#10B981; border-radius:50%; display:inline-block;"></span>
        Online
      </div>
    </header>

    <section class="hero">
      <h1>Discover Joyful Styles</h1>
      <p>Premium clothes, shoes, and school items. Find the perfect fit today.</p>
    </section>

    <section class="quick-filters">
      <h3 class="filter-section-title">Shop by Gender</h3>
      <div class="scroll-row">
        <template x-for="option in genderOptions" :key="option.value">
          <button class="pill-btn" 
                  :class="{ 'is-active': activeGender === option.value }" 
                  @click="activeGender = option.value" 
                  x-text="option.label"></button>
        </template>
      </div>
    </section>

    <section class="quick-filters" style="padding-top:0;">
      <h3 class="filter-section-title">Categories</h3>
      <div class="scroll-row">
        <button class="pill-btn" :class="{ 'is-active': activeCategory === '' }" @click="setCategory('')">All</button>
        <template x-for="category in categories" :key="category.slug">
          <button class="pill-btn" 
                  :class="{ 'is-active': activeCategory === category.slug }" 
                  @click="setCategory(category.slug)"
                  x-text="category.name"></button>
        </template>
      </div>
    </section>

    <section class="product-grid">
      <template x-for="product in filteredProducts()" :key="product.id">
        <article class="product-card" @click="openProduct(product.id)">
          <div class="card-img-wrap">
            <template x-if="product.primary_image_url">
              <img :src="product.primary_image_url" :alt="product.name" loading="lazy">
            </template>
            <template x-if="!product.primary_image_url">
              <div style="width:100%;height:100%;display:grid;place-items:center;color:var(--muted);font-size:0.8rem;">No photo</div>
            </template>
            <template x-if="product.badges.sold_out">
              <span class="card-badge badge-soldout">Sold Out</span>
            </template>
          </div>
          <div class="card-info">
            <h3 class="card-title" x-text="product.name"></h3>
            <p class="card-price" x-text="formatPrice(product.price)"></p>
            <div class="card-meta">
              <span x-text="capitalize(product.gender)"></span>
              <template x-if="product.categories.length > 0">
                <span x-text="`· ${product.categories[0].name}`"></span>
              </template>
            </div>
          </div>
        </article>
      </template>
    </section>
    
    <template x-if="filteredProducts().length === 0">
      <div class="empty-state">No products found for this selection.</div>
    </template>

    <!-- Modal Detail Sheet -->
    <div class="modal-overlay" :class="{ 'is-open': activeProduct !== null }" @click.self="closeProduct()">
      <div class="modal-sheet" x-show="activeProduct !== null" x-transition.duration.300ms>
        <div class="modal-drag-handle" @click="closeProduct()"></div>
        <template x-if="activeProduct">
          <div>
            <template x-if="activeImageUrl">
              <img :src="activeImageUrl" :alt="activeProduct.name" class="modal-img">
            </template>
            <div class="modal-content">
              <h2 class="modal-title" x-text="activeProduct.name"></h2>
              <p class="modal-price" x-text="formatPrice(activeProduct.price)"></p>
              
              <div class="trust-badges">
                <div class="trust-item">
                  <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  Premium Quality
                </div>
                <div class="trust-item">
                  <svg viewBox="0 0 24 24"><path d="M5 12l5 5l10 -10"/></svg>
                  Fast Dispatch
                </div>
              </div>

              <p class="modal-desc" x-text="activeProduct.description || 'Ask us directly on WhatsApp if you need sizing help or more details.'"></p>
              
              <template x-if="!activeProduct.badges.sold_out">
                <a class="action-btn" :href="whatsappHref(activeProduct)" target="_blank" rel="noopener">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/><path d="M9 10a.5.5 0 0 0 1 0V9a.5.5 0 0 0-1 0v1a5 5 0 0 0 5 5h1a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1"/></svg>
                  Order via WhatsApp
                </a>
              </template>
              <template x-if="activeProduct.badges.sold_out">
                <a class="action-btn" :href="notifyMeHref(activeProduct)" target="_blank" rel="noopener">
                  Notify Me When Back
                </a>
              </template>
              
              <button class="action-btn secondary" @click="copyCurrentUrl()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                Copy Link to Share
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item" :class="{ 'is-active': activeCategory === '' && activeGender === '' }" @click="activeCategory=''; activeGender=''; closeProduct(); window.scrollTo(0,0);">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button class="nav-item" @click="window.scrollTo({top: document.querySelector('.quick-filters').offsetTop - 100, behavior: 'smooth'})">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
      <a class="nav-item" :href="waLink()" target="_blank">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Chat
      </a>
    </nav>

  </main>

  <script>
    function storefrontApp() {
      return {
        products: [],
        categories: [],
        status: { status: 'online', store_name: 'Bloom Corner Kiddies', wa_number: '2349049308656' },
        activeCategory: '',
        activeGender: '',
        activeProductId: null,
        activeImageIndex: 0,
        genderOptions: [
          { value: '', label: 'All' },
          { value: 'girls', label: 'Girls' },
          { value: 'boys', label: 'Boys' },
          { value: 'unisex', label: 'Unisex' }
        ],
        async init() {
          await Promise.all([this.loadCategories(), this.loadProducts(), this.loadStatus()]);
          this.restoreProductFromUrl();
          window.addEventListener('popstate', () => this.restoreProductFromUrl());
        },
        async loadProducts() {
          const suffix = this.activeCategory ? `?category=${encodeURIComponent(this.activeCategory)}` : '';
          const response = await fetch(`/api/products.php${suffix}`);
          const payload = await response.json();
          this.products = payload.products || [];
        },
        async loadCategories() {
          const response = await fetch('/api/categories.php');
          const payload = await response.json();
          this.categories = payload.categories || [];
        },
        async loadStatus() {
          const response = await fetch('/api/status.php');
          this.status = await response.json();
        },
        filteredProducts() {
          return this.products.filter((product) => {
            const genderMatch = this.activeGender === '' || product.gender === this.activeGender;
            const categoryMatch = this.activeCategory === '' || product.categories.some(c => c.slug === this.activeCategory);
            return genderMatch && categoryMatch;
          });
        },
        setCategory(slug) {
          this.activeCategory = slug;
          this.loadProducts();
        },
        openProduct(id) {
          this.activeProductId = Number(id);
          const url = new URL(window.location.href);
          url.searchParams.set('product', String(id));
          window.history.pushState({ product: id }, '', url);
        },
        closeProduct() {
          this.activeProductId = null;
          const url = new URL(window.location.href);
          url.searchParams.delete('product');
          window.history.pushState({}, '', url);
        },
        restoreProductFromUrl() {
          const productId = new URLSearchParams(window.location.search).get('product');
          this.activeProductId = productId ? Number(productId) : null;
        },
        get activeProduct() {
          return this.products.find(p => p.id === this.activeProductId) || null;
        },
        get activeImageUrl() {
          if (!this.activeProduct) return '';
          return this.activeProduct.image_urls?.[0] || this.activeProduct.primary_image_url || '';
        },
        formatPrice(value) {
          return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', maximumFractionDigits: 0 }).format(value);
        },
        capitalize(value) {
          return value ? value.charAt(0).toUpperCase() + value.slice(1) : '';
        },
        waLink() {
          return `https://wa.me/${encodeURIComponent(this.status.wa_number || '2349049308656')}`;
        },
        whatsappMessage(product) {
          return `Hi! 👋\nI am interested in:\n*${product.name}*\nPrice: ${this.formatPrice(product.price)}\nLink: ${window.location.href}`;
        },
        whatsappHref(product) {
          return `${this.waLink()}?text=${encodeURIComponent(this.whatsappMessage(product))}`;
        },
        notifyMeHref(product) {
          return `${this.waLink()}?text=${encodeURIComponent(`Hi! Please notify me when this is back in stock: ${product.name} - ${window.location.href}`)}`;
        },
        async copyCurrentUrl() {
          try {
            await navigator.clipboard.writeText(window.location.href);
            alert('Link copied!');
          } catch (_) {}
        }
      };
    }
  </script>
</body>
</html>
