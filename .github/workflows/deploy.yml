name: Deploy to Hostinger

on:
  push:
    branches:
      - main          # production deploys on push to main
  workflow_dispatch:  # manual trigger from GitHub UI

# Only allow one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # 1. Checkout the repository
      # --------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for rsync change detection

      # --------------------------------------------------------
      # 2. Set up SSH key for Hostinger access
      # --------------------------------------------------------
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT || 65002 }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        # Note: Hostinger shared hosting SSH default port is 65002 (not 22)

      # --------------------------------------------------------
      # 3. Deploy public_html/ contents via rsync over SSH
      # --------------------------------------------------------
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='config.php.example' \
            --exclude='*.md' \
            --exclude='_bmad-output/' \
            --exclude='.agents/' \
            --exclude='design-artifacts/' \
            --exclude='docs/' \
            --exclude='uploads/' \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT || 65002 }} -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./public_html/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:public_html/

      # --------------------------------------------------------
      # 4. Deployment status notification
      # --------------------------------------------------------
      - name: Notify success
        if: success()
        run: echo "✅ Deployment to Hostinger successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check logs above"
