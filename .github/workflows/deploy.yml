name: Deploy to Hostinger — bloomcornerkiddies.com

# Deploys ./public_html/ to Hostinger shared hosting
# Site: https://bloomcornerkiddies.com
# Hostinger SSH user: u746391188

on:
  push:
    branches:
      - main          # production deploys on push to main
  workflow_dispatch:  # manual trigger from GitHub UI

# Only allow one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy to Hostinger
    runs-on: ubuntu-latest
    env:
      HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT != '' && secrets.HOSTINGER_SSH_PORT || '65002' }}

    steps:
      # --------------------------------------------------------
      # 1. Checkout the repository
      # --------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for rsync change detection

      # --------------------------------------------------------
      # 2. Set up SSH key for Hostinger access
      # --------------------------------------------------------
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$HOSTINGER_SSH_PORT" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
        # Hostinger SSH: user=u746391188 | port=65002 (not 22)

      # --------------------------------------------------------
      # 3. Deploy public_html/ contents via rsync over SSH
      # --------------------------------------------------------
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='*.md' \
            --exclude='_bmad-output/' \
            --exclude='.agents/' \
            --exclude='design-artifacts/' \
            --exclude='docs/' \
            --exclude='keys/' \
            --exclude='node_modules/' \
            --exclude='package-lock.json' \
            --exclude='package.json' \
            --exclude='scripts/' \
            --exclude='uploads/' \
            -e "ssh -p $HOSTINGER_SSH_PORT -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:domains/bloomcornerkiddies.com/
         

      # --------------------------------------------------------
      # 4. Deployment status notification
      # --------------------------------------------------------
      - name: Notify success
        if: success()
        run: echo "✅ Deployment to Hostinger successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check logs above"
